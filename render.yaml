services:
  - type: web
    name: tvoy-golos-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tvoy-golos-db
          property: connectionString
      - key: LLM_PROVIDER
        value: anthropic
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        value: https://tvoy-golos.vercel.app
      - key: ENV
        value: production
      - key: LLM_TIMEOUT_SEC
        value: "15"
      - key: UNIQUALIZE_MIN_PCT
        value: "40"
    healthCheckPath: /api/health

databases:
  - name: tvoy-golos-db
    plan: starter
    databaseName: tvoy_golos
    user: tvoy_golos
