name: Backend Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install aiosqlite pytest pytest-asyncio httpx

      - name: Run pytest suite
        run: |
          pytest test_autonomous.py -v
        env:
          DATABASE_URL: sqlite+aiosqlite:///./ci_test.db
          LLM_PROVIDER: none

      - name: Run stress test
        run: |
          # Стресс-тест требует реально запущенный сервер С уже созданными таблицами
          python -c "
          import asyncio
          from app.core.database import Base, engine
          from app.models import models
          async def init():
              async with engine.begin() as conn:
                  await conn.run_sync(Base.metadata.create_all)
          asyncio.run(init())
          "
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          SERVER_PID=$!
          for i in $(seq 1 10); do
            curl -s -o /dev/null http://127.0.0.1:8000/api/health && break
            sleep 0.5
          done
          python stress_test.py
          kill $SERVER_PID
        env:
          DATABASE_URL: sqlite+aiosqlite:///./ci_stress.db
          LLM_PROVIDER: none
